<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 목록 앱</title>
    <!-- Tailwind CSS 라이브러리를 온라인에서 가져옵니다 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-8">
    <div class="max-w-md mx-auto">
        <!-- 메인 카드 컨테이너 -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <!-- 제목 -->
            <h1 class="text-3xl font-bold text-gray-800 mb-6">📝 할 일 목록</h1>

            <!-- 입력 섹션: 할 일을 입력하고 추가하는 부분 -->
            <div class="flex gap-2 mb-6">
                <!-- 입력 필드: 사용자가 할 일을 입력하는 곳 -->
                <input
                    type="text"
                    id="todoInput"
                    placeholder="새로운 할 일을 입력하세요..."
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    onkeypress="handleKeyPress(event)">
                <!-- 추가 버튼: 클릭하면 할 일이 목록에 추가됩니다 -->
                <button
                    onclick="addTodo()"
                    class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold transition">
                    추가
                </button>
            </div>

            <!-- 할 일 목록: 추가된 할 일들이 여기 나타납니다 -->
            <ul id="todoList" class="space-y-2">
                <!-- JavaScript에서 동적으로 할 일이 추가됩니다 -->
            </ul>

            <!-- 빈 상태 메시지: 할 일이 없을 때 보여줍니다 -->
            <div id="emptyMessage" class="text-center text-gray-400 py-8">
                할 일이 없습니다. 새로운 할 일을 추가해보세요!
            </div>
        </div>
    </div>

    <script>
        // 할 일 목록을 저장할 배열입니다
        let todos = [];

        /**
         * 새로운 할 일을 추가하는 함수
         * 사용자가 입력한 텍스트를 읽어서 목록에 추가합니다
         */
        function addTodo() {
            // 입력 필드에서 사용자가 입력한 텍스트를 가져옵니다
            const input = document.getElementById('todoInput');
            const text = input.value.trim(); // trim()은 앞뒤 공백을 제거합니다

            // 입력이 비어있으면 함수를 중단합니다
            if (text === '') {
                alert('할 일을 입력해주세요!');
                return;
            }

            // 새로운 할 일 객체를 만듭니다
            // id: 각 할 일을 구분하기 위한 고유한 번호
            // text: 할 일의 내용
            // completed: 완료했는지 여부 (false = 아직 안 함)
            const todo = {
                id: Date.now(), // 현재 시간을 고유한 ID로 사용합니다
                text: text,
                completed: false
            };

            // 만든 할 일을 배열에 추가합니다
            todos.push(todo);

            // 입력 필드를 비웁니다 (다음 입력을 위해)
            input.value = '';
            input.focus(); // 입력 필드에 다시 포커스를 줍니다

            // 화면을 업데이트해서 새로운 할 일을 표시합니다
            renderTodos();
        }

        /**
         * 할 일을 삭제하는 함수
         * @param id - 삭제할 할 일의 ID
         */
        function deleteTodo(id) {
            // 배열에서 해당 ID의 할 일을 찾아서 제거합니다
            // filter()는 조건에 맞는 항목만 새 배열로 만듭니다
            todos = todos.filter(todo => todo.id !== id);

            // 화면을 업데이트합니다
            renderTodos();
        }

        /**
         * 할 일의 완료 상태를 토글하는 함수
         * 체크박스를 클릭하면 완료/미완료 상태가 바뀝니다
         * @param id - 상태를 바꿀 할 일의 ID
         */
        function toggleTodo(id) {
            // 배열의 각 할 일을 확인합니다
            todos = todos.map(todo => {
                // ID가 일치하면 completed 상태를 반대로 바꿉니다
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                // ID가 다르면 그대로 둡니다
                return todo;
            });

            // 화면을 업데이트합니다
            renderTodos();
        }

        /**
         * 할 일 목록을 화면에 렌더링하는 함수
         * 배열의 할 일들을 HTML로 변환해서 표시합니다
         */
        function renderTodos() {
            const todoList = document.getElementById('todoList');
            const emptyMessage = document.getElementById('emptyMessage');

            // 목록을 초기화합니다 (기존 내용을 지웁니다)
            todoList.innerHTML = '';

            // 할 일이 없으면 빈 상태 메시지를 보여줍니다
            if (todos.length === 0) {
                emptyMessage.style.display = 'block';
                return;
            } else {
                emptyMessage.style.display = 'none';
            }

            // 배열의 각 할 일을 반복해서 처리합니다
            todos.forEach(todo => {
                // 새로운 li(리스트 항목) 요소를 만듭니다
                const li = document.createElement('li');

                // 완료했으면 'completed' 클래스를 추가합니다
                const completedClass = todo.completed ? 'completed' : '';

                // HTML 구조를 작성합니다
                li.innerHTML = `
                    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition">
                        <!-- 체크박스: 클릭하면 toggleTodo 함수가 실행됩니다 -->
                        <input
                            type="checkbox"
                            ${todo.completed ? 'checked' : ''}
                            onchange="toggleTodo(${todo.id})"
                            class="w-5 h-5 text-blue-500 rounded cursor-pointer">

                        <!-- 할 일 텍스트: 완료하면 줄이 그어집니다 -->
                        <span class="flex-1 text-gray-700 ${completedClass}">
                            ${todo.text}
                        </span>

                        <!-- 삭제 버튼: 클릭하면 할 일이 삭제됩니다 -->
                        <button
                            onclick="deleteTodo(${todo.id})"
                            class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition">
                            삭제
                        </button>
                    </div>
                `;

                // 만든 li 요소를 목록에 추가합니다
                todoList.appendChild(li);
            });
        }

        /**
         * 엔터 키를 눌렀을 때 할 일을 추가하는 함수
         * @param event - 키보드 이벤트 정보
         */
        function handleKeyPress(event) {
            // 엔터 키(keyCode 13)를 눌렀으면 할 일을 추가합니다
            if (event.keyCode === 13) {
                addTodo();
            }
        }

        // 처음 화면을 로드할 때 빈 상태를 표시합니다
        renderTodos();
    </script>

    <style>
        /* 완료한 할 일에 줄을 그으려는 스타일 */
        .completed {
            text-decoration: line-through;  /* 텍스트에 줄을 긋습니다 */
            color: #9ca3af;                 /* 텍스트 색을 회색으로 만듭니다 */
        }
    </style>
</body>
</html>
